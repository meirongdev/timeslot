apiVersion: v1
kind: Service
metadata:
  name: timeslot
  namespace: timeslot
spec:
  selector:
    app: timeslot
  ports:
    - name: http
      port: 80
      targetPort: 8080
---
# Optional: expose via Ingress
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: timeslot
  namespace: timeslot
  annotations:
    # cert-manager.io/cluster-issuer: letsencrypt-prod
    nginx.ingress.kubernetes.io/proxy-body-size: "1m"
spec:
  ingressClassName: nginx
  rules:
    - host: timeslot.example.com   # change to your domain
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: timeslot
                port:
                  name: http
  tls:
    - hosts:
        - timeslot.example.com
      secretName: timeslot-tls
