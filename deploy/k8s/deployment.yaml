apiVersion: apps/v1
kind: Deployment
metadata:
  name: timeslot
  namespace: timeslot
  labels:
    app: timeslot
spec:
  # SQLite requires ReadWriteOnce — keep replicas at 1
  replicas: 1
  selector:
    matchLabels:
      app: timeslot
  template:
    metadata:
      labels:
        app: timeslot
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000

      initContainers:
        # Render secrets into config.json at startup
        - name: config-init
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              sed \
                -e "s|\$(ADMIN_PASSWORD)|$ADMIN_PASSWORD|g" \
                /config-template/config.json > /config/config.json
          env:
            - name: ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: timeslot-secrets
                  key: admin_password
          volumeMounts:
            - name: config-template
              mountPath: /config-template
            - name: config-rendered
              mountPath: /config

      containers:
        - name: timeslot
          image: ghcr.io/meirongdev/timeslot:latest   # replace with your image
          args: ["-config", "/config/config.json"]
          ports:
            - containerPort: 8080
          volumeMounts:
            - name: data
              mountPath: /data
            - name: config-rendered
              mountPath: /config
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 500m
              memory: 128Mi
          livenessProbe:
            httpGet:
              path: /admin/
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /api/slots
              port: 8080
            initialDelaySeconds: 3
            periodSeconds: 10

      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: timeslot-data
        - name: config-template
          configMap:
            name: timeslot-config
        - name: config-rendered
          emptyDir: {}
