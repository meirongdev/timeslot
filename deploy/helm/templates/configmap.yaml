apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "timeslot.fullname" . }}-config
data:
  config.json: |
    {
      "listen_addr":       ":8080",
      "db_path":           "{{ .Values.persistence.mountPath }}/timeslot.db",
      "admin_user":        "{{ .Values.config.adminUser }}",
      "admin_password":    "$(ADMIN_PASSWORD)",
      "slot_duration_min": {{ .Values.config.slot_duration_min }},
      "buffer_before_min": {{ .Values.config.buffer_before_min }},
      "max_days_ahead":    {{ .Values.config.max_days_ahead }},
      "timezone":          "{{ .Values.config.timezone }}"
    }
